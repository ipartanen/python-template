# for explanation about IDs check: https://docs.astral.sh/ruff/

# HOX: This is just what I have been using and it is quite strict, especially for prototyping.

fix = true


[lint]
select=['ALL']

ignore=[
    'D100',
    'D107',
    'D105',
    'D203',
    'D212',
    'ERA001',
    'FBT001',
    'BLE001',
    'FBT002',
    'TRY301',
    'TRY003',
    'EM101',
    'EM102',
    'FBT003',
    ]

[lint.pydocstyle]
convention = "google"


[lint.pylint]
max-args = 13
max-statements = 60

[lint.mccabe]
max-complexity = 13


